server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve pre-compressed assets if available
    gzip_static on;

    # SPA fallback — all routes resolve to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy API requests to the backend service (port 7070 → Cloud Run)
    location /api/ {
        proxy_pass https://bandtango-vision-dev-732971614822.us-south1.run.app/api/;
        proxy_ssl_server_name on;
        proxy_set_header Host bandtango-vision-dev-732971614822.us-south1.run.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}

# Port 7070 — forward all requests to the Cloud Run backend
server {
    listen 7070;
    server_name _;

    location / {
        proxy_pass https://bandtango-vision-dev-732971614822.us-south1.run.app/;
        proxy_ssl_server_name on;
        proxy_set_header Host bandtango-vision-dev-732971614822.us-south1.run.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
